services:
  db:
    image: postgres:16-alpine
    container_name: cardesk_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: cardesk
      POSTGRES_PASSWORD: cardesk_password
      POSTGRES_DB: cardesk_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardesk -d cardesk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
