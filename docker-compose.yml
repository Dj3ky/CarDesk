services:
  db:
    image: postgres:16-alpine
    container_name: cardesk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cardesk
      POSTGRES_PASSWORD: cardesk_password
      POSTGRES_DB: cardesk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardesk -d cardesk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardesk_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://cardesk:cardesk_password@db:5432/cardesk_db"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_NAME: "CarDesk"
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
